# Docker Compose Override — Survey Server
# This file is automatically merged with docker-compose.yml by Docker Compose
# and is NOT managed by thepopebot (will survive upgrades)

services:
  survey-server:
    container_name: survey-server
    build:
      context: ./survey-server
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AIRTABLE_TOKEN=${AIRTABLE_TOKEN}
      - AIRTABLE_BASE_ID=${AIRTABLE_BASE_ID}
      - CONVERSATIONS_DIR=/app/conversations
    volumes:
      - ./skills-library/accounting-survey/SKILL.md:/app/SKILL.md:ro
      - ./data/survey-conversations:/app/conversations
    ports:
      - "3001:3001"
    depends_on:
      - event-handler
    labels:
      - traefik.enable=true
      - traefik.http.routers.survey.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/survey`)
      - traefik.http.routers.survey.entrypoints=web
      - traefik.http.services.survey.loadbalancer.server.port=3001
    restart: unless-stopped
